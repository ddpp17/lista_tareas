<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista de Tareas</title>

    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#060b23">

    <!-- ICONOS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<div class="app">

    <!-- BLOQUE 1 -->
    <div class="block">
        <label>Agregar tarea FIJA</label>
        <div class="task-input">
            <input type="text" id="input1" placeholder="Escribe una tarea Fija...">
            <button id="btn1"><i class="bi bi-plus-lg"></i></button>
        </div>
        <div class="task-list" id="list1"></div>
    </div>

    <!-- BLOQUE 2 -->
    <div class="block">
        <label>Agregar tarea</label>
        <div class="task-input">
            <input type="text" id="input2" placeholder="Escribe una tarea...">
            <button id="btn2"><i class="bi bi-plus-lg"></i></button>
        </div>
        <div class="task-list" id="list2"></div>
    </div>

</div>

<!-- 👇 MODAL PERSONALIZADO -->
<div id="modal" class="modal hidden">
    <div class="modal-content">
        <p id="modalText"></p>
        <div class="modal-buttons">
            <button id="confirmBtn">Eliminar</button>
            <button id="cancelBtn">Cancelar</button>
        </div>
    </div>
</div>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
        .then(() => console.log("Service Worker registrado"));
}
</script>

</body>
</html>
